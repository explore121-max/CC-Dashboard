<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --accent:       #4F46E5;
  --accent-light: #EEF2FF;
  --accent-hover: #4338CA;
  --text:         #0F172A;
  --text-2:       #64748B;
  --text-3:       #94A3B8;
  --border:       #E2E8F0;
  --bg:           #F8FAFC;
  --card:         #FFFFFF;
  --shadow-sm:    0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:    0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  --green:        #10B981;
  --green-bg:     #ECFDF5;
  --amber:        #F59E0B;
  --amber-bg:     #FFFBEB;
  --red:          #EF4444;
  --red-bg:       #FEF2F2;
  --blue:         #3B82F6;
  --blue-bg:      #EFF6FF;
  --sidebar-w:    240px;
  --radius:       12px;
  --radius-sm:    8px;
  --text-xs:      11px;
  --text-sm:      12px;
  --text-base:    13px;
  --text-lg:      14px;
}
/* ── DARK MODE ───────────────────────────────────────────────────────────────── */
[data-theme="dark"] {
  --text:         #F1F5F9;
  --text-2:       #94A3B8;
  --text-3:       #475569;
  --border:       #1E293B;
  --bg:           #0B1120;
  --card:         #131C2E;
  --accent-light: #1E1B4B;
  --shadow-sm:    0 1px 3px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md:    0 4px 16px rgba(0,0,0,0.5), 0 2px 6px rgba(0,0,0,0.3);
  --green-bg:     #052E16;
  --amber-bg:     #1C1407;
  --red-bg:       #1C0909;
  --blue-bg:      #0C1A2E;
}
body {
  font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: var(--text-lg);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── LAYOUT ─────────────────────────────────────────────────────────────────── */
#root { height: 100vh; height: 100dvh; display: flex; }
#app-shell { height: 100%; display: flex; flex: 1; overflow: hidden; }

/* ── SIDEBAR ─────────────────────────────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--card);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  padding: 20px 12px;
}
.sidebar-logo {
  padding: 4px 12px 20px;
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 12px;
}
.sidebar-logo-icon {
  width: 32px; height: 32px;
  background: var(--accent-light);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.nav-section { flex: 1; }
button.nav-item {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  border: none;
  background: none;
  cursor: pointer;
  color: var(--text-2);
  font-weight: 500;
  font-size: var(--text-lg);
  font-family: inherit;
  text-align: left;
  transition: background 0.12s, color 0.12s;
  margin-bottom: 2px;
}
.nav-item:hover { background: var(--bg); color: var(--text); }
.nav-item.active { background: var(--accent-light); color: var(--accent); }
.nav-icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
.sidebar-footer {
  margin-top: auto;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}
.user-card {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
}
.user-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--accent);
  color: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
  flex-shrink: 0;
}
.user-name  { font-size: var(--text-sm); font-weight: 600; color: var(--text); }
.user-email { font-size: var(--text-xs); color: var(--text-3); }
.logout-btn {
  width: 100%;
  padding: 8px 12px;
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  color: var(--text-2);
  font-size: var(--text-base);
  font-weight: 500;
  font-family: inherit;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: background 0.12s, color 0.12s;
}
.logout-btn:hover { background: var(--bg); color: var(--red); border-color: var(--red); }

/* ── MAIN ────────────────────────────────────────────────────────────────────── */
.main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
.topbar {
  padding: 18px 28px;
  border-bottom: 1px solid var(--border);
  background: var(--card);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 10;
}
.topbar-title { font-size: 17px; font-weight: 700; }
.topbar-sub   { font-size: var(--text-sm); color: var(--text-3); margin-top: 1px; }
.cycle-toggle {
  display: flex;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 3px;
  gap: 2px;
}
.cycle-btn {
  padding: 5px 14px;
  border: none;
  background: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: var(--text-sm);
  font-weight: 500;
  font-family: inherit;
  color: var(--text-2);
  transition: background 0.12s, color 0.12s;
}
.cycle-btn.active {
  background: var(--card);
  color: var(--text);
  box-shadow: var(--shadow-sm);
}
.content { padding: 24px 28px; flex: 1; }

/* ── CARDS ───────────────────────────────────────────────────────────────────── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
}
.card-p { padding: 20px 24px; }
.stat-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 20px;
}
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  box-shadow: var(--shadow-sm);
  transition: box-shadow 0.15s;
}
.stat-card:hover { box-shadow: var(--shadow-md); }
.stat-label {
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 8px;
}
.stat-value  { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }
.stat-sub    { font-size: var(--text-xs); color: var(--text-3); margin-top: 5px; }
.stat-value.green { color: var(--green); }
.stat-value.amber { color: var(--amber); }
.stat-value.red   { color: var(--red);   }

/* ── PILLS ───────────────────────────────────────────────────────────────────── */
.pill {
  display: inline-flex;
  align-items: center;
  padding: 3px 9px;
  border-radius: 100px;
  font-size: var(--text-xs);
  font-weight: 600;
}
.pill-green  { background: var(--green-bg); color: var(--green); }
.pill-amber  { background: var(--amber-bg); color: var(--amber); }
.pill-blue   { background: var(--blue-bg);  color: var(--blue);  }
.pill-purple { background: var(--accent-light); color: var(--accent); }

/* ── TABLE ───────────────────────────────────────────────────────────────────── */
table { width: 100%; border-collapse: collapse; }
th {
  text-align: left;
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
}
td { padding: 11px 16px; border-bottom: 1px solid var(--border); font-size: var(--text-base); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg); }

/* ── FILTER ROW ──────────────────────────────────────────────────────────────── */
.filter-row { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-wrap input {
  width: 100%;
  padding: 8px 12px 8px 34px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: var(--text-base);
  font-family: inherit;
  outline: none;
  background: var(--card);
  transition: border-color 0.15s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-icon {
  position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-3); font-size: var(--text-lg);
  pointer-events: none;
}
.filter-select {
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: var(--text-base);
  font-family: inherit;
  background: var(--card);
  outline: none;
  cursor: pointer;
}
.seg {
  display: flex;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 3px;
}
.seg-btn {
  padding: 5px 14px;
  border: none;
  background: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: var(--text-sm);
  font-weight: 500;
  font-family: inherit;
  color: var(--text-2);
  transition: background 0.12s, color 0.12s;
}
.seg-btn.active {
  background: var(--card);
  color: var(--text);
  box-shadow: var(--shadow-sm);
}

/* ── RECONCILE ───────────────────────────────────────────────────────────────── */
.recon-pane-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}
.recon-pane {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--card);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.pane-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--text-2);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg);
}
.pane-body { overflow-y: auto; max-height: clamp(200px, calc(45vh - 80px), 440px); }
.pane-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
}
.pane-item:last-child { border-bottom: none; }
.pane-item:hover { background: var(--bg); }
.pane-item.selected { background: var(--accent-light); }
.pane-check {
  width: 18px; height: 18px;
  border: 1.5px solid var(--border);
  border-radius: 5px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.12s, border-color 0.12s;
}
.pane-item.selected .pane-check {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
  font-size: 10px;
}
.pane-meta   { flex: 1; min-width: 0; }
.pane-primary { font-size: var(--text-base); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pane-secondary { font-size: var(--text-xs); color: var(--text-3); }
.pane-amount { font-size: var(--text-base); font-weight: 600; flex-shrink: 0; }
.action-bar {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-sm);
}
.action-bar-info { flex: 1; font-size: var(--text-base); }
.action-bar-label { color: var(--text-2); }
.action-bar-gap { font-weight: 700; }
.action-bar-gap.ok   { color: var(--green); }
.action-bar-gap.warn { color: var(--amber); }

/* ── BUTTONS ─────────────────────────────────────────────────────────────────── */
.btn {
  padding: 8px 18px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: var(--text-base);
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.12s, opacity 0.12s, transform 0.1s;
}
.btn:active:not(:disabled) { transform: scale(0.98); }
.btn:disabled { opacity: 0.45; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
.btn-ghost { background: var(--bg); color: var(--text-2); border: 1px solid var(--border); }
.btn-ghost:hover:not(:disabled) { background: var(--border); color: var(--text); }
.btn-danger { background: var(--red-bg); color: var(--red); }
.btn-danger:hover:not(:disabled) { background: #fee2e2; }

/* ── MATCHED HISTORY ─────────────────────────────────────────────────────────── */
.match-group {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 12px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.match-group-header {
  display: flex;
  align-items: center;
  padding: 12px 16px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  gap: 10px;
}
.match-group-body { display: grid; grid-template-columns: 1fr 1fr; }
.match-group-col  { padding: 14px 16px; }
.match-group-col:first-child { border-right: 1px solid var(--border); }
.match-group-col-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 10px;
}
.match-item         { margin-bottom: 8px; font-size: var(--text-sm); }
.match-item:last-child { margin-bottom: 0; }
.match-item-primary   { font-weight: 600; }
.match-item-secondary { color: var(--text-3); font-size: var(--text-xs); margin-top: 1px; }

/* ── LOGIN ───────────────────────────────────────────────────────────────────── */
.login-wrap {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  padding: 24px;
}
.login-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 52px 44px;
  width: 100%;
  max-width: 400px;
  text-align: center;
  box-shadow: var(--shadow-md);
}
.login-logo {
  width: 56px; height: 56px;
  background: var(--accent-light);
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  margin: 0 auto 20px;
}
.login-title { font-size: 24px; font-weight: 700; color: var(--text); margin-bottom: 8px; letter-spacing: -0.02em; }
.login-sub   { font-size: var(--text-base); color: var(--text-2); margin-bottom: 36px; line-height: 1.6; }
.login-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 20px 0;
  color: var(--text-3);
  font-size: var(--text-xs);
}
.login-divider::before, .login-divider::after {
  content: "";
  flex: 1;
  height: 1px;
  background: var(--border);
}
.google-btn-wrap { display: flex; justify-content: center; }
.login-error {
  background: var(--red-bg);
  border: 1px solid #fca5a5;
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  color: var(--red);
  font-size: var(--text-base);
  margin-top: 16px;
}
.login-loading {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  color: var(--text-2);
  font-size: var(--text-sm);
  margin-top: 16px;
}

/* ── LOADING / EMPTY ─────────────────────────────────────────────────────────── */
.loading-wrap { display: flex; align-items: center; justify-content: center; min-height: 200px; color: var(--text-3); flex-direction: column; gap: 10px; }
.spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
.spinner-sm { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes shimmer { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
@keyframes progressSlide { 0% { transform: translateX(-250%); } 100% { transform: translateX(650%); } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
.skel { background: var(--border); border-radius: 4px; animation: shimmer 1.4s ease infinite; }
.refresh-bar { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 14px; overflow: hidden; }
.refresh-progress { height: 100%; width: 35%; background: var(--accent); animation: progressSlide 1.1s ease-in-out infinite; }
.empty-state { text-align: center; padding: 48px 20px; color: var(--text-3); animation: fadeIn 0.2s ease; }
.empty-icon  { font-size: 36px; margin-bottom: 10px; }
.empty-msg   { font-size: var(--text-base); color: var(--text-2); }

/* ── TOAST ───────────────────────────────────────────────────────────────────── */
.toast-wrap {
  position: fixed;
  bottom: 24px; right: 24px;
  display: flex; flex-direction: column;
  gap: 8px; z-index: 9999;
}
.toast {
  background: var(--text);
  color: white;
  padding: 12px 18px;
  border-radius: 12px;
  font-size: var(--text-base);
  font-weight: 500;
  box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  animation: slideIn 0.2s ease;
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 200px;
  max-width: 360px;
}
.toast.success { background: #065F46; }
.toast.error   { background: #991B1B; }
@keyframes slideIn { from { opacity: 0; transform: translateY(10px) scale(0.97); } to { opacity: 1; transform: none; } }

/* ── MODAL ───────────────────────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(15,23,42,0.45);
  display: flex; align-items: center; justify-content: center;
  z-index: 9000;
  animation: fadeIn 0.15s ease;
}
.modal-box {
  background: var(--card);
  border-radius: 16px;
  padding: 28px;
  width: 100%; max-width: 440px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.modal-title  { font-size: 16px; font-weight: 700; margin-bottom: 10px; }
.modal-body   { font-size: var(--text-base); color: var(--text-2); line-height: 1.65; margin-bottom: 22px; }
.modal-footer { display: flex; gap: 10px; justify-content: flex-end; }

/* ── MISC ────────────────────────────────────────────────────────────────────── */
.section-title { font-size: var(--text-base); font-weight: 700; color: var(--text); margin-bottom: 14px; }
.card-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }

/* ── DARK MODE TOGGLE ────────────────────────────────────────────────────────── */
.theme-toggle {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text-2);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
  flex-shrink: 0;
}
.theme-toggle:hover { background: var(--border); color: var(--text); }

/* ── MOBILE BOTTOM NAV ───────────────────────────────────────────────────────── */
.bottom-nav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 62px;
  background: var(--card);
  border-top: 1px solid var(--border);
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom);
}
.bottom-nav-inner { display: flex; height: 100%; }
.bottom-nav-item {
  flex: 1;
  display: flex; flex-direction: column;

</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── API layer ─────────────────────────────────────────────────────────────────
// Session token — persisted in localStorage so refresh doesn't require re-login
let _sessionToken = localStorage.getItem("cc-session") || null;

async function api(action, params = {}) {
  const body = JSON.stringify({
    action,
    sessionToken: _sessionToken,
    ...params,
  });
  const res = await fetch(GAS_URL, {
    method:   "POST",
    headers:  { "Content-Type": "text/plain;charset=utf-8" },
    body,
    redirect: "follow",
  });
  if (!res.ok) throw new Error("Network error " + res.status);
  const data = await res.json();
  if (data.error === "Session expired — please sign in again.") {
    _sessionToken = null;
    localStorage.removeItem("cc-session");
    localStorage.removeItem("cc-email");
    window.location.reload();
  }
  return data;
}

async function authWithGoogle(idToken) {
  const body = JSON.stringify({ action: "auth", idToken });
  const res  = await fetch(GAS_URL, {
    method:   "POST",
    headers:  { "Content-Type": "text/plain;charset=utf-8" },
    body,
    redirect: "follow",
  });
  if (!res.ok) throw new Error("Network error " + res.status);
  return res.json();
}

// ── Formatters ────────────────────────────────────────────────────────────────
function fmt(n) {
  if (n == null || isNaN(n)) return "₹0";
  return "₹" + Math.round(Math.abs(n)).toLocaleString("en-IN");
}
function fmtDate(d) {
  if (!d) return "—";
  const p = d.split("-");
  if (p.length !== 3) return d;
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return parseInt(p[2]) + " " + months[parseInt(p[1]) - 1];
}
function fmtTime(t) {
  if (!t) return "";
  const [h, m] = t.split(":").map(Number);
  if (isNaN(h) || isNaN(m)) return "";
  const ampm = h >= 12 ? "pm" : "am";
  const h12  = h % 12 || 12;
  return h12 + ":" + String(m).padStart(2, "0") + " " + ampm;
}
function initials(email) {
  if (!email) return "?";
  return email.charAt(0).toUpperCase();
}

// ── SVG Icons ─────────────────────────────────────────────────────────────────
function Icon({ name, size = 18, color = "currentColor" }) {
  const s = { width: size, height: size, display: "block", flexShrink: 0 };
  const p = { fill: "none", stroke: color, strokeWidth: 1.75, strokeLinecap: "round", strokeLinejoin: "round" };
  const icons = {
    creditCard: (
      <svg style={s} viewBox="0 0 24 24" {...p}>
        <rect x="2" y="5" width="20" height="14" rx="2"/>
        <line x1="2" y1="10" x2="22" y2="10"/>
        <line x1="6" y1="15" x2="10" y2="15"/>
      </svg>
    ),
    barChart: (
      <svg style={s} viewBox="0 0 24 24" {...p}>
        <rect x="3" y="12" width="4" height="9" rx="1"/>
        <rect x="10" y="6" width="4" height="15" rx="1"/>
        <rect x="17" y="2" width="4" height="19" rx="1"/>
      </svg>
    ),
    receipt: (
      <svg style={s} viewBox="0 0 24 24" {...p}>
        <path d="M4 2v20l3-2 3 2 3-2 3 2 3-2 3 2V2"/>
        <line x1="9" y1="9" x2="15" y2="9"/>
        <line x1="9" y1="13" x2="15" y2="13"/>
      </svg>
    ),
    link: (
      <svg style={s} viewBox="0 0 24 24" {...p}>
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
      </svg>
    ),
    logOut: (
      <svg style={s} viewBox="0 0 24 24" {...p}>
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    ),
    sun: (
      <svg style={s} viewBox="0 0 24 24" {...p}>
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    ),
    moon: (
      <svg style={s} viewBox="0 0 24 24" {...p}>
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    ),
    search: (
      <svg style={s} viewBox="0 0 24 24" {...p}>
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    ),
  };
  return icons[name] || null;
}

// ── Card config ───────────────────────────────────────────────────────────────
const CARDS = [
  { id: "2179", label: "Primary ••2179" },
  { id: "6340", label: "Partner ••6340" },
];

// ── Tab config ────────────────────────────────────────────────────────────────
const TABS = [
  { id: "dashboard",    label: "Dashboard",    icon: "barChart" },
  { id: "transactions", label: "Transactions", icon: "receipt"  },
  { id: "reconcile",   label: "Reconcile",    icon: "link"     },
];

// ── Toasts ────────────────────────────────────────────────────────────────────
function useToasts() {
  const [toasts, setToasts] = useState([]);
  const dismiss = useCallback(id => setToasts(t => t.filter(x => x.id !== id)), []);
  const add = useCallback((msg, type = "success", action = null) => {
    const id = Date.now();
    setToasts(t => [...t, { id, msg, type, action }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), action ? 8000 : 3200);
  }, []);
  return { toasts, add, dismiss };
}
function Toasts({ toasts, dismiss }) {
  return (
    <div className="toast-wrap">
      {toasts.map(t => (
        <div key={t.id} className={`toast ${t.type}`}>
          <span style={{flex:1}}>{t.msg}</span>
          {t.action && (
            <button
              style={{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:6,padding:"3px 10px",color:"white",cursor:"pointer",fontSize:"var(--text-sm)",fontWeight:600,fontFamily:"inherit"}}
              onClick={() => { t.action(); dismiss(t.id); }}
            >Undo</button>
          )}
        </div>
      ))}
    </div>
  );
}

// ── Error Boundary ────────────────────────────────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(err) { return { error: err }; }
  render() {
    if (this.state.error) return (
      <div className="empty-state" style={{padding:"48px 20px"}}>
        <div className="empty-icon">⚠️</div>
        <div style={{fontWeight:600,marginBottom:8}}>Something went wrong</div>
        <div className="empty-msg" style={{marginBottom:16}}>{this.state.error.message}</div>
        <button className="btn btn-ghost" onClick={() => this.setState({ error: null })}>Try again</button>
      </div>
    );
    return this.props.children;
  }
}

// ── Shared components ─────────────────────────────────────────────────────────
function Loading() {
  return <div className="loading-wrap"><div className="spinner"/><span>Loading…</span></div>;
}
function Empty({ icon, msg }) {
  return <div className="empty-state"><div className="empty-icon">{icon}</div><div className="empty-msg">{msg}</div></div>;
}
function Modal({ title, body, onConfirm, onCancel, confirmLabel = "Confirm", confirmClass = "btn btn-primary" }) {
  return (
    <div className="modal-overlay" onClick={onCancel}>
      <div className="modal-box" onClick={e => e.stopPropagation()}>
        <div className="modal-title">{title}</div>
        <div className="modal-body">{body}</div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onCancel}>Cancel</button>
          <button className={confirmClass} onClick={onConfirm}>{confirmLabel}</button>
        </div>
      </div>
    </div>
  );
}
function CycleToggle({ cycles, active, onChange }) {
  if (!cycles) return null;
  return (
    <div className="cycle-toggle">
      {[cycles.currentCycle, cycles.previousCycle].map(c => (
        <button key={c} className={`cycle-btn ${active === c ? "active" : ""}`} onClick={() => onChange(c)}>{c}</button>
      ))}
    </div>
  );
}

// ── Login Screen ──────────────────────────────────────────────────────────────
function LoginScreen({ onSuccess }) {
  const [error,   setError]   = useState("");
  const [loading, setLoading] = useState(false);
  const btnRef = useRef(null);

  useEffect(() => {
    // Wait for GSI library to load, then render the button
    const init = () => {
      if (!window.google?.accounts?.id) return setTimeout(init, 200);
      window.google.accounts.id.initialize({
        client_id:   GOOGLE_CLIENT_ID,
        callback:    handleCredential,
        auto_select: false,
      });
      if (btnRef.current) {
        window.google.accounts.id.renderButton(btnRef.current, {
          theme: "outline",
          size:  "large",
          text:  "signin_with",
          width: 280,
          logo_alignment: "left",
        });
      }
    };
    init();
  }, []);

  async function handleCredential({ credential }) {
    setLoading(true);
    setError("");
    try {
      const res = await authWithGoogle(credential);
      if (res.success) {
        _sessionToken = res.sessionToken;
        localStorage.setItem("cc-session", res.sessionToken);
        localStorage.setItem("cc-email", res.email);
        onSuccess(res.email);
      } else {
        setError(res.error || "Sign-in failed. Please try again.");
      }
    } catch (e) {
      setError("Connection error: " + e.message);
    } finally {
      setLoading(false);
    }
  }

  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-logo">💳</div>
        <div className="login-title">CC Dashboard</div>
        <div className="login-sub">Track your HDFC credit card spends and UPI transfers in one place.</div>
        <div className="google-btn-wrap">
          <div ref={btnRef} style={{minHeight:44}}/>
        </div>
        {loading && (
          <div className="login-loading">
            <div className="spinner" style={{width:18,height:18,borderWidth:2}}/>
            <span>Signing in…</span>
          </div>
        )}
        {error && <div className="login-error">{error}</div>}
        <div style={{marginTop:24,fontSize:"var(--text-xs)",color:"var(--text-3)"}}>
          Access is restricted to authorised accounts only.
        </div>
      </div>
    </div>
  );
}

// ── Dashboard Skeleton ────────────────────────────────────────────────────────
function DashboardSkeleton() {
  const sk = { display:"block", marginBottom:8 };
  return (
    <div>
      <div className="stat-grid">
        {[0,1,2,3].map(i => (
          <div key={i} className="stat-card">
            <div className="skel" style={{...sk,height:10,width:"50%"}}/>
            <div className="skel" style={{...sk,height:28,width:"70%"}}/>
            <div className="skel" style={{height:10,width:"35%"}}/>
          </div>
        ))}
      </div>
      <div className="skel" style={{height:13,width:60,marginBottom:14}}/>
      <div className="card-row">
        {[0,1].map(i => (
          <div key={i} className="stat-card">
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
              <div>
                <div className="skel" style={{...sk,height:15,width:100}}/>
                <div className="skel" style={{height:10,width:60}}/>
              </div>
              <div className="skel" style={{height:22,width:90,borderRadius:100}}/>
            </div>
            <div style={{display:"flex",gap:20}}>
              {[0,1].map(j => (
                <div key={j}>
                  <div className="skel" style={{...sk,height:10,width:44}}/>
                  <div className="skel" style={{height:20,width:64}}/>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
      <div className="skel" style={{height:64,borderRadius:12}}/>
    </div>
  );
}

// ── Dashboard Tab ─────────────────────────────────────────────────────────────
function DashboardTab({ cycles, activeCycle }) {
  const [summary, setSummary] = useState(null);
  const [loading, setLoading] = useState(true);
  const load = useCallback(() => {
    setLoading(true);
    api("getSummary")
      .then(r => { if (r.valid) setSummary(r); else setSummary(null); })
      .catch(() => setSummary(null))
      .finally(() => setLoading(false));
  }, []);
  useEffect(() => { load(); }, [load]);

  const cycleData = summary && (
    activeCycle === summary.currentCycle?.label ? summary.currentCycle : summary.previousCycle
  );
  if (loading) return <DashboardSkeleton/>;
  if (!summary || !cycleData) return (
    <div className="empty-state">
      <div className="empty-icon">📊</div>
      <div className="empty-msg" style={{marginBottom:14}}>No data available for this cycle.</div>
      <button className="btn btn-ghost" onClick={load}>Refresh</button>
    </div>
  );

  const isOk     = cycleData.totalUnmatched === 0;
  const gapColor = cycleData.totalUnmatched > 0 ? "red" : "green";
  const txnCount = Object.values(cycleData.byCard || {}).reduce((n, c) => n + (c.count || 0), 0);

  return (
    <div style={{animation:"fadeIn 0.2s ease"}}>
      <div className="stat-grid">
        <div className="stat-card">
          <div className="stat-label">Total Spend</div>
          <div className="stat-value">{fmt(cycleData.totalSpend)}</div>
          <div className="stat-sub">{txnCount} transaction{txnCount !== 1 ? "s" : ""}</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Transferred</div>
          <div className="stat-value green">{fmt(cycleData.totalTransferred)}</div>
          <div className="stat-sub">to savings ••2395</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Unmatched Spend</div>
          <div className={`stat-value ${gapColor}`}>{fmt(cycleData.totalUnmatched)}</div>
          <div className="stat-sub">{cycleData.unmatchedCount} item{cycleData.unmatchedCount !== 1 ? "s" : ""}</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Unmatched Transfers</div>
          <div className={`stat-value ${cycleData.unmatchedTransferCount > 0 ? "amber" : "green"}`}>
            {fmt(cycleData.unmatchedTransferAmt)}
          </div>
          <div className="stat-sub">{cycleData.unmatchedTransferCount} transfer{cycleData.unmatchedTransferCount !== 1 ? "s" : ""}</div>
        </div>
      </div>

      <div className="section-title">By Card</div>
      <div className="card-row">
        {CARDS.map(({ id: card, label: cardLabel }) => {
          const c = cycleData.byCard?.[card] || {};
          return (
            <div key={card} className="stat-card">
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
                <div>
                  <div style={{fontWeight:700,fontSize:15,letterSpacing:"-0.01em"}}>{cardLabel}</div>
                  <div style={{fontSize:11,color:"var(--text-3)",marginTop:2}}>{c.count || 0} transactions</div>
                </div>
                <div className={`pill ${c.unmatchedCount > 0 ? "pill-amber" : "pill-green"}`}>
                  {c.unmatchedCount > 0 ? `${c.unmatchedCount} unmatched` : "All matched"}
                </div>
              </div>
              <div style={{display:"flex",gap:24}}>
                <div>
                  <div className="stat-label">Spend</div>
                  <div style={{fontWeight:700,fontSize:16}}>{fmt(c.spend)}</div>
                </div>
                <div>
                  <div className="stat-label">Matched</div>
                  <div style={{fontWeight:700,fontSize:16,color:"var(--green)"}}>{fmt(c.matched)}</div>
                </div>
                {c.unmatched > 0 && (
                  <div>
                    <div className="stat-label">Unmatched</div>
                    <div style={{fontWeight:700,fontSize:16,color:"var(--red)"}}>{fmt(c.unmatched)}</div>
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>

      <div className="card card-p" style={{
        background: isOk ? "var(--green-bg)" : "var(--amber-bg)",
        border: `1px solid ${isOk ? "#6ee7b7" : "#fcd34d"}`,
        display: "flex", alignItems: "center", gap: 14,
      }}>
        <div style={{fontSize:28}}>{isOk ? "✅" : "⚠️"}</div>
        <div>
          <div style={{fontWeight:700,fontSize:15,color:isOk?"var(--green)":"var(--amber)",marginBottom:3}}>
            {isOk ? "All transactions covered" : `${cycleData.unmatchedCount} spend${cycleData.unmatchedCount!==1?"s":""} not yet transferred`}
          </div>
          <div style={{fontSize:12,color:"var(--text-2)"}}>
            {isOk
              ? "Every credit card swipe has a matching fund transfer to savings."
              : "Head to the Reconcile tab to link transactions with transfers."}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Transactions Tab ──────────────────────────────────────────────────────────
function TransactionsTab({ cycles, activeCycle }) {
  const [tab,            setTab]            = useState("spends");
  const [filter,         setFilter]         = useState("all");
  const [cardFilter,     setCardFilter]     = useState("all");
  const [search,         setSearch]         = useState("");
  const [transferSearch, setTransferSearch] = useState("");
  const [dateFrom,       setDateFrom]       = useState("");
  const [dateTo,         setDateTo]         = useState("");
  const [rows,           setRows]           = useState(null);
  const [ftRows,         setFtRows]         = useState(null);
  const [loading,        setLoading]        = useState(true);

  useEffect(() => {
    setLoading(true);
    Promise.all([
      api("getCycleTransactions", { cycle: activeCycle }),
      api("getUnreconciledItems"),
    ]).then(([txnRes, unreconRes]) => {
      if (txnRes.valid)     setRows(txnRes.rows);
      if (unreconRes.valid) setFtRows(unreconRes.unmatchedTransfers);
    }).finally(() => setLoading(false));
  }, [activeCycle]);

  const spends = (rows || []).filter(r => {
    if (filter === "unmatched" && r.status !== "Unmatched") return false;
    if (cardFilter !== "all" && r.card !== cardFilter) return false;
    if (dateFrom && r.txnDate < dateFrom) return false;
    if (dateTo   && r.txnDate > dateTo)   return false;
    if (search) {
      const q = search.toLowerCase().replace(/[₹,\s]/g,"");
      if (!r.merchant.toLowerCase().includes(search.toLowerCase()) && !String(r.txnAmount).includes(q)) return false;
    }
    return true;
  });

  const filteredFtRows = (ftRows || []).filter(ft => {
    if (!transferSearch) return true;
    const q = transferSearch.toLowerCase().replace(/[₹,\s]/g,"");
    return (ft.tfrVpa || "").toLowerCase().includes(q) || String(ft.tfrAmount).includes(q);
  });

  if (loading) return <Loading/>;
  return (
    <div>
      <div className="filter-row">
        <div className="seg">
          <button className={`seg-btn ${tab==="spends"?"active":""}`} onClick={() => setTab("spends")}>Spends</button>
          <button className={`seg-btn ${tab==="transfers"?"active":""}`} onClick={() => setTab("transfers")}>Transfers</button>
        </div>
        {tab === "spends" && <>
          <div className="seg">
            <button className={`seg-btn ${filter==="all"?"active":""}`} onClick={() => setFilter("all")}>All</button>
            <button className={`seg-btn ${filter==="unmatched"?"active":""}`} onClick={() => setFilter("unmatched")}>Unmatched</button>
          </div>
          <div className="seg">
            <button className={`seg-btn ${cardFilter==="all"?"active":""}`} onClick={() => setCardFilter("all")}>All cards</button>
            {CARDS.map(({ id }) => (
              <button key={id} className={`seg-btn ${cardFilter===id?"active":""}`} onClick={() => setCardFilter(id)}>••{id}</button>
            ))}
          </div>
          <div className="search-wrap">
            <span className="search-icon"><Icon name="search" size={15}/></span>
            <input placeholder="Merchant or ₹amount…" value={search} onChange={e => setSearch(e.target.value)}/>
          </div>
          <input type="date" value={dateFrom} onChange={e => setDateFrom(e.target.value)} title="From date"
            style={{padding:"8px 10px",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",fontSize:"var(--text-base)",fontFamily:"inherit",background:"var(--card)",outline:"none",color:"var(--text)"}}/>
          <input type="date" value={dateTo} onChange={e => setDateTo(e.target.value)} title="To date"
            style={{padding:"8px 10px",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",fontSize:"var(--text-base)",fontFamily:"inherit",background:"var(--card)",outline:"none",color:"var(--text)"}}/>
        </>}
        {tab === "transfers" && (
          <div className="search-wrap">
            <span className="search-icon"><Icon name="search" size={15}/></span>
            <input placeholder="VPA or amount…" value={transferSearch} onChange={e => setTransferSearch(e.target.value)}/>
          </div>
        )}
      </div>
      {tab === "transfers" && (
        <div style={{fontSize:"var(--text-sm)",color:"var(--text-2)",marginBottom:12,padding:"9px 13px",background:"var(--blue-bg)",borderRadius:8,border:"1px solid var(--border)"}}>
          💡 Transfers go to savings ••2395 regardless of which card was swiped.
        </div>
      )}
      {tab === "spends" ? (
        spends.length === 0
          ? <Empty icon="🧾" msg="No transactions match your filters."/>
          : <div className="card" style={{overflow:"hidden"}}>
              <table>
                <thead>
                  <tr>
                    <th>Date & Time</th>
                    <th>Merchant</th>
                    <th>Card</th>
                    <th>Status</th>
                    <th style={{textAlign:"right"}}>Amount</th>
                    <th>Matched Transfer</th>
                  </tr>
                </thead>
                <tbody>
                  {spends.map(r => (
                    <tr key={r.txnMsgId}>
                      <td style={{color:"var(--text-2)"}}>
                        <div>{fmtDate(r.txnDate)}</div>
                        {r.txnTime && <div style={{fontSize:"var(--text-xs)",color:"var(--text-3)"}}>{fmtTime(r.txnTime)}</div>}
                      </td>
                      <td style={{fontWeight:500}}>{r.merchant || "—"}</td>
                      <td style={{color:"var(--text-2)"}}>••{r.card}</td>
                      <td>
                        <span className={`pill ${r.status==="Auto-Matched"?"pill-green":r.status==="Manually Matched"?"pill-blue":"pill-amber"}`}>
                          {r.status}
                        </span>
                      </td>
                      <td style={{textAlign:"right",fontWeight:600,fontVariantNumeric:"tabular-nums"}}>{fmt(r.txnAmount)}</td>
                      <td style={{color:"var(--text-2)"}}>
                        {r.tfrDate ? `${fmtDate(r.tfrDate)} · ${fmt(r.tfrAmount)}` : "—"}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
      ) : (
        filteredFtRows.length === 0
          ? <Empty icon="💸" msg={transferSearch ? "No transfers match your search." : "No unmatched transfers in this cycle."}/>
          : <div className="card" style={{overflow:"hidden"}}>
              <table>
                <thead>
                  <tr><th>Date</th><th>From VPA</th><th style={{textAlign:"right"}}>Amount</th></tr>
                </thead>
                <tbody>
                  {filteredFtRows.map(ft => (
                    <tr key={ft.tfrMsgId}>
                      <td style={{color:"var(--text-2)"}}>{fmtDate(ft.tfrDate)}</td>
                      <td>{ft.tfrVpa || "—"}</td>
                      <td style={{textAlign:"right",fontWeight:600}}>{fmt(ft.tfrAmount)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
      )}
    </div>
  );
}

// ── Reconcile Tab ─────────────────────────────────────────────────────────────
function ReconcileTab({ activeCycle, addToast }) {
  const [data,        setData]        = useState(null);
  const [initialLoad, setInitialLoad] = useState(true);
  const [refreshing,  setRefreshing]  = useState(false);
  const [selSpends,   setSelSpends]   = useState(new Set());
  const [selTfrs,     setSelTfrs]     = useState(new Set());
  const [confirming,  setConfirming]  = useState(false);
  const [busy,        setBusy]        = useState(false);
  const [unlinking,   setUnlinking]   = useState(null);
  const savedGroupRef = useRef(null);

  const reload = useCallback((isInitial = false) => {
    if (isInitial) setInitialLoad(true); else setRefreshing(true);
    setSelSpends(new Set()); setSelTfrs(new Set());
    api("getReconcileGroups", { cycle: activeCycle })
      .then(r => { if (r.valid) setData(r); })
      .finally(() => { setInitialLoad(false); setRefreshing(false); });
  }, [activeCycle]);

  useEffect(() => { reload(true); }, [reload]);

  const toggleSpend = id => setSelSpends(s => { const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n; });
  const toggleTfr   = id => setSelTfrs(s  => { const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n; });

  const unmatchedSpends    = data?.unmatchedSpends    || [];
  const unmatchedTransfers = data?.unmatchedTransfers || [];
  const groups             = data?.groups             || [];
  const selSpendRows = unmatchedSpends.filter(r => selSpends.has(r.txnMsgId));
  const selTfrRows   = unmatchedTransfers.filter(r => selTfrs.has(r.tfrMsgId));
  const totalSpend   = selSpendRows.reduce((s, r) => s + r.txnAmount, 0);
  const totalTfr     = selTfrRows.reduce((s, r)  => s + r.tfrAmount, 0);
  const gap          = totalTfr - totalSpend;
  const canLink      = selSpends.size > 0 && selTfrs.size > 0;

  function doSuggest() {
    const suggested = unmatchedTransfers.filter(t => Math.abs(t.tfrAmount - totalSpend) <= 100);
    if (!suggested.length) { addToast("No transfers within ₹100 of the selected spend total.", "error"); return; }
    setSelTfrs(new Set(suggested.map(t => t.tfrMsgId)));
  }

  async function doLink() {
    setBusy(true); setConfirming(false);
    try {
      const res = await api("linkGroupMatch", { txnMsgIds: [...selSpends], tfrMsgIds: [...selTfrs] });
      if (res.success) { addToast("Matched successfully!", "success"); reload(); }
      else             { addToast(res.error || "Failed to match", "error"); }
    } catch (e) { addToast("Error: " + e.message, "error"); }
    finally     { setBusy(false); }
  }

  async function doUnlink(groupId) {
    const group = groups.find(g => g.id === groupId);
    if (group) {
      savedGroupRef.current = {
        txnMsgIds: group.spends.map(s => s.txnMsgId),
        tfrMsgIds: group.transfers.map(t => t.tfrMsgId),
      };
    }
    setBusy(true); setUnlinking(null);
    try {
      const res = await api("unlinkGroup", { groupId });
      if (res.success) {
        const saved = savedGroupRef.current;
        addToast("Group unlinked.", "success", saved ? async () => {
          const r = await api("linkGroupMatch", { txnMsgIds: saved.txnMsgIds, tfrMsgIds: saved.tfrMsgIds });
          if (r.success) { addToast("Undo successful — group re-linked.", "success"); reload(); }
          else           { addToast(r.error || "Undo failed.", "error"); }
        } : null);
        reload();
      } else { addToast(res.error || "Failed to unlink", "error"); }
    } catch (e) { addToast("Error: " + e.message, "error"); }
    finally     { setBusy(false); }
  }

  if (initialLoad) return <Loading/>;
  return (
    <div>
      {refreshing && <div className="refresh-bar"><div className="refresh-progress"/></div>}

      <div className="recon-pane-grid">
        {/* Unmatched spends */}
        <div className="recon-pane">
          <div className="pane-header">
            <span>Unmatched Spends</span>
            <span className={`pill ${unmatchedSpends.length > 0 ? "pill-amber" : "pill-green"}`}>
              {unmatchedSpends.length}
            </span>
          </div>
          <div className="pane-body">
            {unmatchedSpends.length === 0
              ? <div className="empty-state" style={{padding:"24px 16px"}}><div>✅ All spends matched</div></div>
              : unmatchedSpends.map(r => (
                  <div key={r.txnMsgId}
                    className={`pane-item ${selSpends.has(r.txnMsgId) ? "selected" : ""}`}
                    role="checkbox" aria-checked={selSpends.has(r.txnMsgId)}
                    tabIndex={0}
                    onClick={() => toggleSpend(r.txnMsgId)}
                    onKeyDown={e => (e.key===" "||e.key==="Enter") && toggleSpend(r.txnMsgId)}
                  >
                    <div className="pane-check">{selSpends.has(r.txnMsgId) ? "✓" : ""}</div>
                    <div className="pane-meta">
                      <div className="pane-primary">{r.merchant || "—"}</div>
                      <div className="pane-secondary">••{r.card} · {fmtDate(r.txnDate)}{r.txnTime ? " · " + fmtTime(r.txnTime) : ""}</div>
                    </div>
                    <div className="pane-amount">{fmt(r.txnAmount)}</div>
                  </div>
                ))
            }
          </div>
        </div>

        {/* Unmatched transfers */}
        <div className="recon-pane">
          <div className="pane-header">
            <span>Unmatched Transfers</span>
            <span className={`pill ${unmatchedTransfers.length > 0 ? "pill-amber" : "pill-green"}`}>
              {unmatchedTransfers.length}
            </span>
          </div>
          <div className="pane-body">
            {unmatchedTransfers.length === 0
              ? <div className="empty-state" style={{padding:"24px 16px"}}><div>✅ All transfers matched</div></div>
              : unmatchedTransfers.map(r => (
                  <div key={r.tfrMsgId}
                    className={`pane-item ${selTfrs.has(r.tfrMsgId) ? "selected" : ""}`}
                    role="checkbox" aria-checked={selTfrs.has(r.tfrMsgId)}
                    tabIndex={0}
                    onClick={() => toggleTfr(r.tfrMsgId)}
                    onKeyDown={e => (e.key===" "||e.key==="Enter") && toggleTfr(r.tfrMsgId)}
                  >
                    <div className="pane-check">{selTfrs.has(r.tfrMsgId) ? "✓" : ""}</div>
                    <div className="pane-meta">
                      <div className="pane-primary">{r.tfrVpa || "UPI Transfer"}</div>
                      <div className="pane-secondary">{fmtDate(r.tfrDate)}</div>
                    </div>
                    <div className="pane-amount">{fmt(r.tfrAmount)}</div>
                  </div>
                ))
            }
          </div>
        </div>
      </div>

      {selSpends.size > 0 && (
        <div className="action-bar">
          <div className="action-bar-info">
            <span className="action-bar-label">
              {selSpends.size} spend{selSpends.size!==1?"s":""} ({fmt(totalSpend)})
              {selTfrs.size > 0 && (
                <> ↔ {selTfrs.size} transfer{selTfrs.size!==1?"s":""} ({fmt(totalTfr)}) · Gap:{" "}
                  <span className={`action-bar-gap ${Math.abs(gap)<=100?"ok":"warn"}`}>
                    {gap>=0?"+":""}{fmt(gap)}
                  </span>
                </>
              )}
            </span>
          </div>
          <button className="btn btn-ghost" onClick={() => { setSelSpends(new Set()); setSelTfrs(new Set()); }}>Clear</button>
          {selTfrs.size === 0 && (
            <button className="btn btn-ghost" disabled={busy} onClick={doSuggest} title="Auto-select transfers within ₹100 of the selected spend total">
              ✨ Suggest
            </button>
          )}
          {canLink && (
            <button className="btn btn-primary" disabled={busy} onClick={() => setConfirming(true)}>
              {busy ? <span style={{display:"flex",alignItems:"center",gap:8}}><div className="spinner-sm"/>Linking…</span> : "Link Match"}
            </button>
          )}
        </div>
      )}

      {groups.length > 0 && (
        <>
          <div className="section-title" style={{marginTop:canLink?8:0}}>Matched Groups</div>
          {groups.map(g => (
            <div key={g.id} className="match-group">
              <div className="match-group-header">
                <span className={`pill ${g.status==="Manually Matched"?"pill-blue":"pill-green"}`}>{g.status}</span>
                <span style={{flex:1,fontSize:"var(--text-sm)",color:"var(--text-2)"}}>
                  {fmt(g.totalSpend)} spend · {fmt(g.totalTransfer)} transferred
                  {Math.abs(g.gap)>0 && (
                    <span style={{color:Math.abs(g.gap)<=100?"var(--green)":"var(--amber)"}}>
                      {" "}·{" "}
                      {Math.abs(g.gap)<=100
                        ? `settled (${g.gap>0?"+":""}${fmt(g.gap)})`
                        : g.gap>0 ? `+${fmt(g.gap)} surplus` : `${fmt(g.gap)} short`}
                    </span>
                  )}
                </span>
                <button className="btn btn-danger" style={{padding:"4px 12px",fontSize:"var(--text-sm)"}}
                  disabled={busy} onClick={() => setUnlinking(g.id)}>Unmatch</button>
              </div>
              <div className="match-group-body">
                <div className="match-group-col">
                  <div className="match-group-col-label">Spends</div>
                  {g.spends.map(s => (
                    <div key={s.txnMsgId} className="match-item">
                      <div className="match-item-primary">{s.merchant||"—"} · {fmt(s.txnAmount)}</div>
                      <div className="match-item-secondary">••{s.card} · {fmtDate(s.txnDate)}{s.txnTime ? " · " + fmtTime(s.txnTime) : ""}</div>
                    </div>
                  ))}
                </div>
                <div className="match-group-col">
                  <div className="match-group-col-label">Transfers</div>
                  {g.transfers.map(t => (
                    <div key={t.tfrMsgId} className="match-item">
                      <div className="match-item-primary">{fmt(t.tfrAmount)}</div>
                      <div className="match-item-secondary">{t.tfrVpa||"UPI"} · {fmtDate(t.tfrDate)}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          ))}
        </>
      )}

      {confirming && (
        <Modal title="Confirm Match"
          body={
            <div>
              <div>Link <strong>{selSpends.size} spend{selSpends.size!==1?"s":""}</strong> totalling <strong>{fmt(totalSpend)}</strong> to <strong>{selTfrs.size} transfer{selTfrs.size!==1?"s":""}</strong> totalling <strong>{fmt(totalTfr)}</strong>?</div>
              {Math.abs(gap)>100 && <div style={{marginTop:10,color:"var(--amber)"}}>⚠️ Gap of {fmt(Math.abs(gap))} — amounts don't balance closely.</div>}
            </div>
          }
          confirmLabel="Link Match"
          onConfirm={doLink} onCancel={() => setConfirming(false)}
        />
      )}
      {unlinking && (
        <Modal title="Remove Match"
          body="This will unlink all transactions in the group. They'll appear as Unmatched until re-linked. Continue?"
          confirmLabel="Remove Match" confirmClass="btn btn-danger"
          onConfirm={() => doUnlink(unlinking)} onCancel={() => setUnlinking(null)}
        />
      )}
    </div>
  );
}

// ── Bottom Nav ────────────────────────────────────────────────────────────────
function BottomNav({ tabs, active, onChange }) {
  return (
    <nav className="bottom-nav">
      <div className="bottom-nav-inner">
        {tabs.map(t => (
          <button key={t.id} className={`bottom-nav-item ${active===t.id?"active":""}`} onClick={() => onChange(t.id)}>
            <span className="bottom-nav-icon"><Icon name={t.icon} size={20}/></span>
            {t.label}
          </button>
        ))}
      </div>
    </nav>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [userEmail,   setUserEmail]   = useState(() => localStorage.getItem("cc-email") || null);
  const [tab,         setTab]         = useState("dashboard");
  const [cycles,      setCycles]      = useState(null);
  const [activeCycle, setActiveCycle] = useState(null);
  const [darkMode,    setDarkMode]    = useState(() => {
    return localStorage.getItem("cc-theme") === "dark";
  });
  const { toasts, add: addToast, dismiss: dismissToast } = useToasts();

  // Apply theme to <html> element
  useEffect(() => {
    document.documentElement.setAttribute("data-theme", darkMode ? "dark" : "light");
    localStorage.setItem("cc-theme", darkMode ? "dark" : "light");
  }, [darkMode]);

  useEffect(() => {
    if (!userEmail) return;
    api("getCycleLabels").then(r => {
      if (r.valid) { setCycles(r); setActiveCycle(r.currentCycle); }
    });
  }, [userEmail]);

  function logout() {
    _sessionToken = null;
    localStorage.removeItem("cc-session");
    localStorage.removeItem("cc-email");
    setUserEmail(null); setCycles(null); setActiveCycle(null); setTab("dashboard");
    setTimeout(() => {
      if (window.google?.accounts?.id) window.google.accounts.id.prompt();
    }, 100);
  }

  if (!userEmail) return <LoginScreen onSuccess={setUserEmail}/>;

  return (
    <div id="app-shell">
      {/* Sidebar */}
      <div className="sidebar">
        <div className="sidebar-logo">
          <div className="sidebar-logo-icon"><Icon name="creditCard" size={20}/></div>
          CC Dashboard
        </div>
        <div className="nav-section">
          {TABS.map(t => (
            <button key={t.id}
              className={`nav-item ${tab===t.id?"active":""}`}
              onClick={() => setTab(t.id)}
              aria-current={tab===t.id?"page":undefined}
            >
              <span className="nav-icon"><Icon name={t.icon} size={16}/></span>
              {t.label}
            </button>
          ))}
        </div>
        <div className="sidebar-footer">
          <div className="user-card">
            <div className="user-avatar">{initials(userEmail)}</div>
            <div>
              <div className="user-name">{userEmail.split("@")[0]}</div>
              <div className="user-email">{userEmail}</div>
            </div>
          </div>
          <button className="logout-btn" onClick={logout}>
            <Icon name="logOut" size={14}/> Sign out
          </button>
        </div>
      </div>

      {/* Main */}
      <div className="main">
        <div className="topbar">
          <div>
            <div className="topbar-title">{TABS.find(t => t.id===tab)?.label}</div>
            {activeCycle && <div className="topbar-sub">{activeCycle}</div>}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            {cycles && <CycleToggle cycles={cycles} active={activeCycle} onChange={setActiveCycle}/>}
            <button className="theme-toggle" onClick={() => setDarkMode(d => !d)} title={darkMode?"Switch to light mode":"Switch to dark mode"}>
              <Icon name={darkMode ? "sun" : "moon"} size={16}/>
            </button>
          </div>
        </div>
        <div className="content">
          {tab==="dashboard"    && <ErrorBoundary key="db"><DashboardTab    cycles={cycles} activeCycle={activeCycle}/></ErrorBoundary>}
          {tab==="transactions" && <ErrorBoundary key="tx"><TransactionsTab cycles={cycles} activeCycle={activeCycle}/></ErrorBoundary>}
          {tab==="reconcile"   && <ErrorBoundary key="rc"><ReconcileTab    activeCycle={activeCycle} addToast={addToast}/></ErrorBoundary>}
        </div>
      </div>

      <BottomNav tabs={TABS} active={tab} onChange={setTab}/>
      <Toasts toasts={toasts} dismiss={dismissToast}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
